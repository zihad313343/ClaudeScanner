name: Build Android APK from zip

# Runs automatically whenever you push a .zip to the repo, and can also be
# triggered manually from the Actions tab (use this if the zip is already
# committed and you just want to (re)build it).
on:
  push:
    paths:
      - "**/*.zip"
  workflow_dispatch:
    inputs:
      zip_path:
        description: >
          Optional: exact path to the project zip (e.g. netscan-edu-android-app.zip).
          Leave blank to auto-detect the first .zip found in the repo.
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 1. Find the project zip - either the one the user pointed to via
      #    the manual "zip_path" input, or the first *.zip in the repo.
      # ---------------------------------------------------------------
      - name: Locate project zip
        id: locate_zip
        run: |
          set -e
          INPUT_PATH="${{ github.event.inputs.zip_path }}"

          if [ -n "$INPUT_PATH" ]; then
            if [ ! -f "$INPUT_PATH" ]; then
              echo "::error::zip_path '$INPUT_PATH' was given but that file doesn't exist in the repo."
              exit 1
            fi
            ZIP_FILE="$INPUT_PATH"
          else
            ZIP_FILE=$(find . -maxdepth 3 -iname "*.zip" -not -path "*/.git/*" | head -n 1)
            if [ -z "$ZIP_FILE" ]; then
              echo "::error::No .zip file found anywhere in the repo. Upload your project zip first."
              exit 1
            fi
          fi

          echo "Found zip: $ZIP_FILE"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 2. Unzip it.
      # ---------------------------------------------------------------
      - name: Unzip project
        run: |
          set -e
          mkdir -p extracted
          unzip -q "${{ steps.locate_zip.outputs.zip_file }}" -d extracted
          echo "Extracted contents:"
          find extracted -maxdepth 3

      # ---------------------------------------------------------------
      # 3. Auto-detect the actual Gradle project root inside the zip.
      #    Handles the zip containing the project directly, or wrapped
      #    in one (or more) extra folders - whatever folder holds
      #    settings.gradle(.kts) is the real root.
      # ---------------------------------------------------------------
      - name: Auto-detect project root
        id: find_root
        run: |
          set -e
          SETTINGS_FILE=$(find extracted -maxdepth 6 -type f \( -name "settings.gradle.kts" -o -name "settings.gradle" \) | head -n 1)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::Couldn't find settings.gradle(.kts) anywhere inside the zip - is this a Gradle Android project?"
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "Detected project root: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 4. Toolchain.
      # ---------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platform & build-tools
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # ---------------------------------------------------------------
      # 5. The zip has no committed Gradle wrapper, so generate one
      #    (pinned to a version compatible with AGP 8.5.x) unless the
      #    project already shipped its own.
      # ---------------------------------------------------------------
      - name: Ensure Gradle wrapper exists
        working-directory: ${{ steps.find_root.outputs.project_dir }}
        run: |
          set -e
          if [ -f "./gradlew" ]; then
            echo "Wrapper already present."
            chmod +x ./gradlew
          else
            echo "No wrapper found - generating one."
            gradle wrapper --gradle-version 8.7 --distribution-type bin
            chmod +x ./gradlew
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles(format('{0}/**/*.gradle*', steps.find_root.outputs.project_dir)) }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ---------------------------------------------------------------
      # 6. Build.
      # ---------------------------------------------------------------
      - name: Build debug APK
        working-directory: ${{ steps.find_root.outputs.project_dir }}
        run: ./gradlew assembleDebug --stacktrace

      # ---------------------------------------------------------------
      # 7. Publish the APK so you can download it from the finished run.
      # ---------------------------------------------------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.find_root.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
